# KiCad CI/CD Pipeline — Professional Documentation Suite
# ─────────────────────────────────────────────────────────────────────────────
# Jobs:
#   erc    → Electrical Rules Check           (must pass; blocks drc)
#   drc    → Design Rules Check + sch parity  (must pass; blocks export)
#   export → Full professional doc set:
#              fab/        Gerbers + drill + fab ZIP
#              docs/       Schematic PDF, assembly drawings, board layout PDFs
#              preview/    SVG board previews (front + back)
#              assembly/   BOM + pick-and-place / CPL + assembly ZIP
#              3d/         STEP model + 3D renders (if GPU available)
#   release→ GitHub Release with all docs attached (tags matching v*)
#
# Container: ghcr.io/kicad/kicad:9.0  (official KiCad image, GPL-3.0)
#   Running a GPL binary in CI does NOT affect the license of these scripts.
#
# All workflow scripts (scripts/*.sh) are MIT-licensed.

name: KiCad CI

on:
  push:
    branches: ["**"]
    tags:     ["v*"]
  pull_request:
    branches: ["**"]
  workflow_dispatch:

env:
  KICAD_IMAGE: ghcr.io/kicad/kicad:9.0
  # ── USER CONFIG ───────────────────────────────────────────────────────────
  # Set PROJECT_DIR to the directory containing your .kicad_sch / .kicad_pcb.
  # If your KiCad files are at the repo root, remove this line entirely.
  # Example: PROJECT_DIR: hardware/my-board
  PROJECT_DIR: test-project   # ← change or remove this line
  # Set SKIP_RENDER: "0" on a self-hosted runner with GPU for 3D renders.
  # GitHub-hosted runners have no GPU — renders are skipped by default.
  SKIP_RENDER: "1"

# ── ERC ───────────────────────────────────────────────────────────────────────
jobs:
  erc:
    name: "ERC — Electrical Rules Check"
    runs-on: ubuntu-latest
    container:
      image: ghcr.io/kicad/kicad:9.0
      options: --user root

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Make scripts executable
        run: chmod +x scripts/*.sh scripts/lib/*.sh

      - name: Run ERC
        run: scripts/erc.sh

      - name: Upload ERC report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: erc-report
          path: output/erc/
          if-no-files-found: warn

# ── DRC ───────────────────────────────────────────────────────────────────────
  drc:
    name: "DRC — Design Rules Check"
    runs-on: ubuntu-latest
    needs: erc
    container:
      image: ghcr.io/kicad/kicad:9.0
      options: --user root

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Make scripts executable
        run: chmod +x scripts/*.sh scripts/lib/*.sh

      - name: Run DRC
        run: scripts/drc.sh

      - name: Upload DRC report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: drc-report
          path: output/drc/
          if-no-files-found: warn

# ── Export ────────────────────────────────────────────────────────────────────
  export:
    name: "Export — Full Documentation Suite"
    runs-on: ubuntu-latest
    needs: [erc, drc]
    container:
      image: ghcr.io/kicad/kicad:9.0
      options: --user root

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Make scripts executable
        run: chmod +x scripts/*.sh scripts/lib/*.sh

      - name: Export all documentation
        run: scripts/export.sh

      # ── Fabrication files (for fab house upload) ──────────────────────────
      - name: Upload — Fabrication (Gerbers + drill + ZIP)
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: fab-${{ github.sha }}
          path: output/fab/
          if-no-files-found: warn

      # ── Documentation PDFs ────────────────────────────────────────────────
      - name: Upload — Documentation (schematic PDF, assembly drawings)
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: docs-${{ github.sha }}
          path: output/docs/
          if-no-files-found: warn

      # ── Board preview SVGs ────────────────────────────────────────────────
      - name: Upload — Board previews (SVG)
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: preview-${{ github.sha }}
          path: output/preview/
          if-no-files-found: warn

      # ── Assembly BOM + pick & place ───────────────────────────────────────
      - name: Upload — Assembly (BOM + pick-and-place + ZIP)
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: assembly-${{ github.sha }}
          path: output/assembly/
          if-no-files-found: warn

      # ── 3D files (STEP + renders) ─────────────────────────────────────────
      - name: Upload — 3D (STEP model + renders)
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: 3d-${{ github.sha }}
          path: output/3d/
          if-no-files-found: warn

# ── Release ───────────────────────────────────────────────────────────────────
  release:
    name: "Release — Publish full doc set on tag"
    runs-on: ubuntu-latest
    needs: export
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: "*-${{ github.sha }}"
          path: release-assets/
          merge-multiple: false

      # Re-zip each category for clean release attachment
      - name: Package release assets
        run: |
          TAG="${GITHUB_REF_NAME}"
          cd release-assets
          for dir in */; do
            category="${dir%/}"
            # strip the sha suffix for human-readable names
            name=$(echo "$category" | sed "s/-${{ github.sha }}//")
            zip -r "${name}.zip" "$category/"
          done
          ls -lh *.zip

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TAG="${GITHUB_REF_NAME}"
          gh release create "$TAG" \
            --title "Release $TAG" \
            --generate-notes \
            release-assets/*.zip

# ── Pages ─────────────────────────────────────────────────────────────────────
  pages:
    name: "Pages — Deploy board preview site"
    runs-on: ubuntu-latest
    needs: [erc, drc, export]
    if: github.event_name != 'pull_request' && needs.export.result == 'success'
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Make scripts executable
        run: chmod +x scripts/*.sh scripts/lib/*.sh

      - name: Download preview artifacts
        uses: actions/download-artifact@v4
        with:
          name: preview-${{ github.sha }}
          path: site/preview/

      - name: Download docs artifacts
        uses: actions/download-artifact@v4
        with:
          name: docs-${{ github.sha }}
          path: site/docs/

      - name: Generate Pages site
        env:
          ERC_STATUS: ${{ needs.erc.result }}
          DRC_STATUS: ${{ needs.drc.result }}
          SITE_DIR: site
        run: scripts/gen-pages.sh

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: site/

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
