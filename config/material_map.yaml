# SPDX-License-Identifier: MIT
# PBR material map for KiCad PCB Blender renders.
#
# After VRML import, Blender objects are matched to entries here by their
# dominant vertex/diffuse colour. Colours are specified in sRGB (0-1 range);
# blender_render.py converts them to linear space before comparison.
#
# Each entry:
#   color     : [r, g, b] sRGB reference colour for matching
#   tolerance : Euclidean distance threshold in linear RGB space (0–√3)
#   bsdf      : Principled BSDF parameters (linear colour space)
#     base_color   : [r, g, b] linear
#     metallic     : 0.0 (dielectric) – 1.0 (metal)
#     roughness    : 0.0 (mirror) – 1.0 (fully rough)
#     ior          : (optional) index of refraction
#     transmission : (optional) 0.0–1.0 for glass-like materials

solder_mask_green:
  color: [0.04, 0.36, 0.04]
  tolerance: 0.18
  bsdf:
    base_color: [0.007, 0.098, 0.007]
    metallic: 0.0
    roughness: 0.35

